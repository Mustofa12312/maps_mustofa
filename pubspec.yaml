name: maps_ibadah
description: "Aplikasi Navigasi & Perjalanan Ibadah"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # GPS & Sensor
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Geocoding & Search
  geocoding: ^3.0.0

  # Voice Navigation
  flutter_tts: ^4.2.0

  # HTTP
  http: ^1.2.2

  # Local Storage
  shared_preferences: ^2.3.2

  # State Management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utilities
  intl: ^0.19.0
  flutter_compass: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
